# Docker-oriented example configuration. It binds to all interfaces so the
# server is reachable through Docker port publishing.
version = 1

[server]
bind = "0.0.0.0"
port = 46796
body_limit_bytes = 1048576

[[endpoints]]
name = "hello"
method = "GET"
path = "/v1/hello"
action = "respond.static"

[endpoints.response]
status = 200
body = { ok = true, service = "artur", runtime = "docker" }
headers = { cache-control = "no-store" }

[[endpoints]]
name = "echo"
method = "POST"
path = "/v1/process/echo/{name}"
action = "process.run"
process = "echo_json"

[[processes]]
name = "echo_json"
mode = "sync"
command = "python3"
args = ["examples/scripts/echo.py", "--name", "{{param.name}}", "--source", "{{query.source}}"]
timeout_ms = 30000
stdout_format = "json"

[processes.stdin]
type = "request_json"
